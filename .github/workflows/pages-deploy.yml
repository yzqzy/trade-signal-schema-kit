name: Build and Deploy research-hub to GitHub Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      run_dir:
        description: "Optional workflow/business-analysis run root to emit reports before build (e.g. output/workflow/600941/<runId>)"
        required: false
        type: string

env:
  NODE_VERSION: 22
  PNPM_VERSION: "10.24.0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      # GitHub 项目页：<user>.github.io/<repo>/ — 与 Next basePath 对齐
      NEXT_BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore Next.js cache (research-hub)
        uses: actions/cache@v4
        with:
          path: apps/research-hub/.next/cache
          key: ${{ runner.os }}-research-hub-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/research-hub/**/*.tsx', 'apps/research-hub/**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-research-hub-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build monorepo (packages for optional emit/sync)
        run: pnpm run build

      - name: Emit and sync reports (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_dir != '' }}
        run: |
          pnpm --filter @trade-signal/research-strategies run run:reports-site-emit -- --run-dir "${{ github.event.inputs.run_dir }}"
          pnpm --filter @trade-signal/research-strategies run run:reports-site-sync

      - name: Build research-hub static export
        run: pnpm --filter @trade-signal/research-hub run build
        env:
          NEXT_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_REPORTS_TIMEZONE: Asia/Shanghai

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/research-hub/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
